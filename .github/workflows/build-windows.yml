name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win nsis --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ICF-Creative-Portfolio-Windows
          path: |
            dist/*.exe
            dist/*.yml
          retention-days: 30

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          REPO="Alexthebrit/icf-portfolio-releases"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          echo "Uploading Windows installer to ${REPO} as ${TAG}..."

          EXISTING=$(gh release view "$TAG" --repo "$REPO" 2>&1 || true)

          if echo "$EXISTING" | grep -q "release not found"; then
            echo "Creating new release ${TAG}..."
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "v${VERSION}" \
              --notes "Windows installer for ICF Creative Portfolio v${VERSION}" \
              dist/*.exe dist/latest.yml
          else
            echo "Release ${TAG} exists, uploading Windows assets..."

            for f in dist/*.exe; do
              gh release upload "$TAG" "$f" --repo "$REPO" --clobber
            done

            if [ -f "dist/latest.yml" ]; then
              gh release upload "$TAG" "dist/latest.yml" --repo "$REPO" --clobber
            fi
          fi

          echo "Done! Windows installer uploaded to ${REPO} release ${TAG}"
