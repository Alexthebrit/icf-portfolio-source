<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background-color: #090738;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      box-sizing: border-box;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }
    h2 {
      margin: 0 0 20px 0;
      font-weight: 500;
      font-size: 18px;
    }
    .progress-bar {
      width: 100%;
      height: 12px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      background-color: #00d2ff;
      width: 0%;
      transition: width 0.2s ease;
    }
    .details {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-bottom: 25px;
      min-height: 32px;
      word-break: break-all;
    }
    button {
      -webkit-app-region: no-drag;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    button:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <h2 id="title">📦 Loading Portfolio Content</h2>
  <div class="progress-bar">
    <div class="progress-fill" id="fill"></div>
  </div>
  <div class="details" id="details">Scanning Box folder...</div>
  <button id="skip-btn">Skip for now</button>

  <script>
    const fill = document.getElementById('fill');
    const details = document.getElementById('details');
    const title = document.getElementById('title');
    
    document.getElementById('skip-btn').addEventListener('click', () => {
      window.splashAPI.skip();
    });

    window.splashAPI.onProgress((data) => {
      if (data.pct !== undefined) {
        fill.style.width = `${Math.min(100, Math.max(0, data.pct))}%`;
      }
      if (data.detail) {
        details.innerHTML = data.detail;
      }
      if (data.title) {
        title.innerText = data.title;
      }
    });
  </script>
</body>
</html>
